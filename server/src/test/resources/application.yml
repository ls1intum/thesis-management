logging:
  level:
    liquibase: INFO
    net.fortuna.ical4j.util.Configurator: INFO

spring:
  thymeleaf:
    check-template-location: false
  datasource:
    url: jdbc:postgresql://unreachable:5432/thesis-management
    username: ""
    password: ""
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          starttls:
            enable: true

server:
  servlet:
    context-path: /api

thesis-management:
  keycloak:
    host: http://unreachable:8081
    realm-name: thesis-management
    client-id: thesis-management-app
    service-client:
      id: thesis-management-service-client
      secret: ""
      student-group-name: thesis-students
  client:
    host: http://localhost:3000
  mail:
    enabled: true
    sender: thesis-dev@test.aet.cit.tum.de
  data-retention:
    cron: "-"
    rejected-application-retention-days: 365
  storage:
    upload-location: uploads
