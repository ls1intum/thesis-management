name: Deploy Docker Image

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      server_image_tag:
        default: "latest"
        type: string
      client_image_tag:
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: '${{ vars.CLIENT_HOST }}'
    steps:
      - name: SSH to VM and Execute Docker-Compose Down
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          script: |
            docker compose -f docker-compose.prod.yml --env-file=.env.prod down --remove-orphans --rmi local

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create main.cf and master.cf File
        env:
          POSTFIX_MAIN_CF: ${{ vars.POSTFIX_MAIN_CF }}
          POSTFIX_MASTER_CF: ${{ vars.POSTFIX_MASTER_CF }}
        run: |
          printf '%s' "$POSTFIX_MAIN_CF" > main.cf
          printf '%s' "$POSTFIX_MASTER_CF" > master.cf

      - name: Copy Docker Compose File From Repo to VM Host
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          source: "./docker-compose.prod.yml"
          target: /home/${{ vars.VM_USERNAME }}

      - name: Copy main.cf to VM Host
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          source: "main.cf"
          target: /home/${{ vars.VM_USERNAME }}/postfix-config/

      - name: Copy master.cf to VM Host
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          source: "master.cf"
          target: /home/${{ vars.VM_USERNAME }}/postfix-config/

      - name: SSH to VM and Create .env.prod
        uses: appleboy/ssh-action@v1.2.5
        env:
          SERVER_TAG: ${{ inputs.server_image_tag }}
          CLIENT_TAG: ${{ inputs.client_image_tag }}
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          envs: SERVER_TAG,CLIENT_TAG
          script: |
            rm -f .env.prod
            cat << 'ENVEOF' > .env.prod
            SPRING_DATASOURCE_DATABASE=${{ vars.SPRING_DATASOURCE_DATABASE }}
            SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            APP_HOSTNAME=${{ vars.APP_HOSTNAME }}
            SERVER_HOST=${{ vars.SERVER_HOST }}
            CLIENT_HOST=${{ vars.CLIENT_HOST }}
            APPLICATION_TITLE=${{ vars.APPLICATION_TITLE }}
            CHAIR_NAME=${{ vars.CHAIR_NAME }}
            CHAIR_URL=${{ vars.CHAIR_URL }}
            DEFAULT_SUPERVISOR_UUID=${{ vars.DEFAULT_SUPERVISOR_UUID }}
            ALLOW_SUGGESTED_TOPICS=${{ vars.ALLOW_SUGGESTED_TOPICS }}
            THESIS_TYPES=${{ vars.THESIS_TYPES }}
            STUDY_PROGRAMS=${{ vars.STUDY_PROGRAMS }}
            STUDY_DEGREES=${{ vars.STUDY_DEGREES }}
            GENDERS=${{ vars.GENDERS }}
            LANGUAGES=${{ vars.LANGUAGES }}
            CUSTOM_DATA=${{ vars.CUSTOM_DATA }}
            THESIS_FILES=${{ vars.THESIS_FILES }}
            SCIENTIFIC_WRITING_GUIDE=${{ vars.SCIENTIFIC_WRITING_GUIDE }}
            MAIL_SENDER=${{ vars.MAIL_SENDER }}
            MAIL_SIGNATURE=${{ vars.MAIL_SIGNATURE }}
            MAIL_BCC_RECIPIENTS=${{ vars.MAIL_BCC_RECIPIENTS }}
            MAIL_WORKSPACE_URL=${{ vars.MAIL_WORKSPACE_URL }}
            KEYCLOAK_HOST=${{ vars.KEYCLOAK_HOST }}
            KEYCLOAK_REALM_NAME=${{ vars.KEYCLOAK_REALM_NAME }}
            KEYCLOAK_CLIENT_ID=${{ vars.KEYCLOAK_CLIENT_ID }}
            KEYCLOAK_SERVICE_CLIENT_ID=${{ vars.KEYCLOAK_SERVICE_CLIENT_ID }}
            KEYCLOAK_SERVICE_CLIENT_SECRET=${{ secrets.KEYCLOAK_SERVICE_CLIENT_SECRET }}
            KEYCLOAK_SERVICE_STUDENT_GROUP_NAME=${{ vars.KEYCLOAK_SERVICE_STUDENT_GROUP_NAME }}
            CALDAV_ENABLED=${{ vars.CALDAV_ENABLED }}
            CALDAV_URL=${{ vars.CALDAV_URL }}
            CALDAV_USERNAME=${{ vars.CALDAV_USERNAME }}
            CALDAV_PASSWORD=${{ secrets.CALDAV_PASSWORD }}
            ENVEOF
            echo "SERVER_IMAGE_TAG=${SERVER_TAG:-latest}" >> .env.prod
            echo "CLIENT_IMAGE_TAG=${CLIENT_TAG:-latest}" >> .env.prod

      - name: SSH to VM and Execute Docker-Compose Up
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          proxy_host: ${{ vars.DEPLOYMENT_GATEWAY_HOST }}
          proxy_username: ${{ vars.DEPLOYMENT_GATEWAY_USER }}
          proxy_key: ${{ secrets.DEPLOYMENT_GATEWAY_SSH_KEY }}
          proxy_port: ${{ vars.DEPLOYMENT_GATEWAY_PORT }}
          script: |
            docker compose -f docker-compose.prod.yml --env-file=.env.prod up --pull=always -d
