name: Run Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 1

      # Set up Java for server tests
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'gradle'

      # Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x ./server/gradlew

      # Run tests with coverage for server
      - name: Run server tests with coverage
        working-directory: ./server
        run: |
          ./gradlew test jacocoTestReport

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: server/build/reports/jacoco/test/html/
          retention-days: 14

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: server/build/reports/tests/test/
          retention-days: 14

      # Set up Node for client tests (Vitest + node:test)
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run client tests (Vitest + node:test)
        working-directory: ./client
        run: npm test

      - name: Upload Client Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: client-test-results
          path: client/coverage/
          retention-days: 14
