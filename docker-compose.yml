services:
  db:
    image: 'postgres:18.3-alpine'
    container_name: thesis-management-db
    volumes:
      - ./db_backups:/db_backups
    environment:
      - POSTGRES_USER=thesis-management-postgres
      - POSTGRES_PASSWORD=thesis-management-postgres
      - POSTGRES_DB=thesis-management
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d thesis-management -U thesis-management-postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5144:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: thesis-management-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/thesis-management-realm.json:/opt/keycloak/data/import/thesis-management-realm.json:ro
    entrypoint: /opt/keycloak/bin/kc.sh start-dev --import-realm
    ports:
      - "8081:8080"

  mailpit:
    image: axllent/mailpit:v1.29
    container_name: thesis-management-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
